<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether Ventures</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05050a;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(180,160,255,0.25);
    --text: #e8e4f0;
    --muted: rgba(232,228,240,0.4);
    --accent: #b4a0f5;
    --accent-dim: rgba(180,160,245,0.12);
    --glow: rgba(140,110,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 200;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, opacity 0.3s ease;
    mix-blend-mode: screen;
  }
  .cursor-ring {
    position: fixed;
    width: 32px;
    height: 32px;
    border: 1px solid rgba(180,160,245,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
  }

  /* Aether canvas background */
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.6;
  }

  /* Noise grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.35;
  }

  .page {
    position: relative;
    z-index: 2;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* Header */
  header {
    padding: 80px 0 60px;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards;
    animation-delay: 0.2s;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
  }

  .wordmark em {
    font-style: italic;
    color: var(--accent);
    font-weight: 300;
  }

  .tagline {
    margin-top: 14px;
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 300;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--border-hover);
    margin: 28px 0;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.5s;
  }

  /* Section label */
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.7s;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    padding-bottom: 80px;
  }

  /* Artifact card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px 26px 22px;
    position: relative;
    overflow: hidden;
    cursor: none;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
    transition: border-color 0.4s ease, background 0.4s ease;
    text-decoration: none;
    display: block;
    color: inherit;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, var(--glow), transparent 70%);
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: var(--accent-dim);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card-tag {
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    opacity: 0.7;
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 10px;
    color: var(--text);
  }

  .card-desc {
    font-size: 0.78rem;
    line-height: 1.65;
    color: var(--muted);
    font-weight: 300;
  }

  .card-arrow {
    position: absolute;
    bottom: 22px;
    right: 24px;
    font-size: 0.9rem;
    color: var(--accent);
    opacity: 0;
    transform: translateX(-6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  .card-line {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0%;
    height: 1px;
    background: var(--accent);
    transition: width 0.5s ease;
  }

  .card:hover .card-line {
    width: 100%;
  }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    padding: 60px 0;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 1s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<canvas id="aetherCanvas"></canvas>

<div class="page">
  <header>
    <div class="wordmark">Aether <em>Ventures</em></div>
    <div class="tagline">A collection of living artifacts</div>
  </header>

  <div class="divider"></div>

  <div class="section-label">Artifacts</div>

  <div class="grid" id="grid"></div>
</div>

<script>
// ─── Aether particle field ────────────────────────────────────────────────────
const canvas = document.getElementById('aetherCanvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function makeParticle() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.18,
    size: Math.random() * 1.4 + 0.3,
    alpha: Math.random() * 0.5 + 0.1,
    pulse: Math.random() * Math.PI * 2
  };
}

for (let i = 0; i < 120; i++) particles.push(makeParticle());

// Flow lines
const flows = Array.from({length: 6}, (_, i) => ({
  x: (i / 5) * W,
  offset: Math.random() * 100
}));

function drawAether() {
  ctx.clearRect(0, 0, W, H);
  time += 0.003;

  // Draw flow ribbons
  for (let f = 0; f < flows.length; f++) {
    const flow = flows[f];
    ctx.beginPath();
    const baseX = (f / (flows.length - 1)) * W;
    ctx.moveTo(baseX, 0);

    for (let y = 0; y < H; y += 8) {
      const xWave = baseX
        + Math.sin(y * 0.006 + time + flow.offset) * 80
        + Math.sin(y * 0.003 - time * 0.7) * 40;
      ctx.lineTo(xWave, y);
    }

    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(140,110,255,0)');
    grad.addColorStop(0.3, `rgba(140,110,255,${0.03 + Math.sin(time + f) * 0.015})`);
    grad.addColorStop(0.7, `rgba(100,80,200,${0.025 + Math.cos(time * 0.8 + f) * 0.01})`);
    grad.addColorStop(1, 'rgba(140,110,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw particles
  for (const p of particles) {
    p.x += p.vx + Math.sin(time * 0.5 + p.pulse) * 0.15;
    p.y += p.vy + Math.cos(time * 0.4 + p.pulse) * 0.1;
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
    if (p.y < -10) p.y = H + 10;
    if (p.y > H + 10) p.y = -10;

    const alpha = p.alpha * (0.7 + Math.sin(time * 1.2 + p.pulse) * 0.3);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,160,245,${alpha})`;
    ctx.fill();
  }

  // Faint particle connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 90) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(160,140,235,${(1 - dist/90) * 0.06})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(drawAether);
}
drawAether();

// ─── Custom cursor ────────────────────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = -100, my = -100, rx = -100, ry = -100;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

function animateCursor() {
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

// ─── Artifacts data ────────────────────────────────────────────────────────────
// 👇 THIS IS YOUR ARTIFACTS LIST — add entries here
const artifacts = [
  {
    name: "WINGER MATRIX",
    tag: "Theology",
    description: "This matrix compares competing interpretations across objective criteria to clearly show what each side is actually arguing.",
    url: "https://totallaw1.github.io/winger-matrix/"
  },
  {
    name: "Airflow Simulator",
    tag: "Tool",
    description: "Interactive room airflow dynamics with fan placement, temperature layers, and strategy advisor.",
    url: "https://totallaw1.github.io/airflow-simulator/"
  },
  {
    name: "YGWYG",
    tag: "Experience",
    description: "Underground invitation-only dining. Dark luxury brand. Two-stage location reveal.",
    url: "https://gatsby.events/j210/rsvp/register?e=ygwyg"
  }
];

// ─── Render cards ─────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');

if (artifacts.length === 0) {
  grid.innerHTML = `<div class="empty">No artifacts yet — the void awaits.</div>`;
} else {
  artifacts.forEach((a, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = a.url;
    card.target = '_blank';
    card.rel = 'noopener';
    card.style.animationDelay = `${0.8 + i * 0.12}s`;
    card.innerHTML = `
      <div class="card-tag">${a.tag}</div>
      <div class="card-name">${a.name}</div>
      <div class="card-desc">${a.description}</div>
      <div class="card-arrow">→</div>
      <div class="card-line"></div>
    `;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
